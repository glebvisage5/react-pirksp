services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-educrm}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-educrm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - auth-service
      - user-service
      - course-service
      - task-service
      - group-service
      - study-team-service
      - file-service
      - team-service
      - gta-service

  # Монолит на 4009 — fallback пока идёт миграция (Фаза 1→8)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      PORT: 4009
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4009:4009"
    volumes:
      - ./server/src:/app/src
      - uploads:/app/uploads

  # ── Микросервисы ──────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4001
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4001:4001"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4002
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4002:4002"

  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4003
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4003:4003"

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4004
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4004:4004"

  group-service:
    build:
      context: .
      dockerfile: services/group-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4005
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4005:4005"

  study-team-service:
    build:
      context: .
      dockerfile: services/study-team-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4006
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4006:4006"

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4007
      DB_HOST: db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4007:4007"

  team-service:
    build:
      context: .
      dockerfile: services/team-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4008
      DB_HOST: db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4008:4008"

  gta-service:
    build:
      context: .
      dockerfile: services/gta-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4010
      DB_HOST: db
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4010:4010"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
  uploads:
